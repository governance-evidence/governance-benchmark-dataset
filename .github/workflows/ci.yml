name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: python -m pip install -e ".[dev]"

      # Run all pre-commit hooks (lint, format, mypy, vulture, pytest,
      # markdownlint, yamllint, toml-sort, typos, detect-secrets, etc.)
      - uses: pre-commit/action@v3.0.1

      # Dependency vulnerability scan (not in pre-commit)
      - run: python -m pip_audit --strict --desc

  test-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -v --tb=short
